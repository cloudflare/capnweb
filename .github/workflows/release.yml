name: Release
permissions:
  actions: write # to dispatch CLA on the changesets release branch
  contents: write # to create release (changesets/action)
  issues: write # to post issue comments (changesets/action)
  pull-requests: write # to create pull request (changesets/action)
  id-token: write # to use OpenID Connect token for provenance (changesets/action)

on:
  workflow_run:
    workflows: ["Test"]
    branches: [main]
    types: [completed]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.repository_owner == 'cloudflare' }}
    timeout-minutes: 5
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: "24" # includes npm 11.5.1 or later, needed for trusted publishing
          cache: "npm"

      - run: npm ci
      # we explicitly run here because changesets might not be running the build step https://github.com/changesets/changesets/issues/860#issuecomment-1316398728
      - run: npm run build

      - id: changesets
        uses: changesets/action@v1
        with:
          # Note that these commands are NOT interpreted by a shell, they are apparently only
          # split on whitespace and then passed directly to execvp(). Hence the need to indirect
          # through a shell script, ugh. :(
          version: ./.github/changeset-version.sh
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Dispatch CLA for changesets release PR"
        if: ${{ steps.changesets.outputs.pullRequestNumber != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          set -euo pipefail

          pr="repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}"
          state=$(gh api "$pr" --jq '.state')
          head_ref=$(gh api "$pr" --jq '.head.ref')
          head_repo=$(gh api "$pr" --jq '.head.repo.full_name')
          author=$(gh api "$pr" --jq '.user.login')

          if [[ "$state" != "open" || "$author" != "github-actions[bot]" || "$head_ref" != "changeset-release/main" || "$head_repo" != "$GITHUB_REPOSITORY" ]]; then
            echo "Refusing to dispatch CLA for unexpected PR: state=$state author=$author head=$head_repo:$head_ref"
            exit 1
          fi

          gh workflow run cla.yml --ref "$head_ref" -f "pull_request=${PR_NUMBER}"

  prerelease:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.repository_owner == 'cloudflare' }}
    timeout-minutes: 5
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: "24" # includes npm 11.5.1 or later, needed for trusted publishing
          cache: "npm"

      - run: npm ci

      - name: Modify package.json version
        run: npx tsx .github/version-script.ts

      - run: npm publish --tag beta
