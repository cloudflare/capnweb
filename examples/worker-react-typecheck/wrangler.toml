name = "capnweb-react-typecheck-example"
# Generated by `capnweb-typecheck build`; see README.md.
main = ".wrangler/typecheck/src/worker.ts"
compatibility_date = "2024-09-01"

[build]
command = "node ../../packages/capnweb-typecheck/dist/cli.cjs build --cwd . --out .wrangler/typecheck"
cwd = "examples/worker-react-typecheck"
watch_dir = "src"


[vars]
# Optional per-method artificial delays (ms)
DELAY_AUTH_MS = 80
DELAY_PROFILE_MS = 120
DELAY_NOTIFS_MS = 120

# Optional simulated network latency per direction (ms)
SIMULATED_RTT_MS = 120
SIMULATED_RTT_JITTER_MS = 40
